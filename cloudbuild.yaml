steps:
  # Step 1: Run tests (ESLint)
  - name: 'node:20-alpine'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        npm ci && npm run lint || true

  # Step 2: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'VITE_GEMINI_API_KEY=$$VITE_GEMINI_API_KEY'
      - '-t'
      - 'gcr.io/$PROJECT_ID/healia:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/healia:latest'
      - '.'
    secretEnv: ['VITE_GEMINI_API_KEY']

  # Step 3: Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/healia:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/healia:latest'

  # Step 4: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'healia'
      - '--image=gcr.io/$PROJECT_ID/healia:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--set-secrets=VITE_GEMINI_API_KEY=gemini-api-key:latest'

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/gemini-api-key/versions/latest
      env: 'VITE_GEMINI_API_KEY'

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - 'gcr.io/$PROJECT_ID/healia:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/healia:latest'
